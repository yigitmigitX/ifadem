<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alfabe ve Kelime Çalışması</title>
<style>
body{font-family: Arial, sans-serif;background:#d9ecff;margin:0;text-align:center;}
.baslik{font-size:35px;padding:25px;font-weight:bold;}
.menu{background:#3399ff;padding:10px;}
.menu button{font-size:18px;padding:10px 20px;margin:5px;cursor:pointer;border:none;border-radius:10px;color:white;background:#007acc;transition:0.2s;}
.menu button:hover{background:#005f99;}
.bolum{display:none;}
.bolum.active{display:block;}
.kart-menu{margin:20px 0;}
.kart-menu button{font-size:18px;padding:10px 18px;margin:6px;cursor:pointer;border:none;border-radius:10px;background:#ffcc00;color:#333;transition:0.2s;}
.kart-menu button:hover{background:#ffe066;}
.kapsayici{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;padding:20px;}
.kart{background:white;border-radius:20px;padding:15px;box-shadow:0 5px 15px rgba(0,0,0,0.2);transition:0.3s;}
.kart img{width:140px;margin-top:10px;}
.kirmizi{color:red;font-weight:bold;cursor:pointer;margin-top:10px;}
video{width:170px;margin-top:10px;display:none;border-radius:10px;}
/* Quiz için */
.quiz-soru{font-size:22px;margin:20px 0 10px 0;}
.quiz-secim{font-size:18px;padding:10px 20px;margin:8px;cursor:pointer;border:none;border-radius:10px;background:#ffcc00;color:#333;transition:0.2s;}
.quiz-secim:hover{background:#ffe066;}
.quiz-sonuc{font-size:20px;margin-top:15px;font-weight:bold;}
</style>
</head>
<body>

<div class="baslik">Alfabe ve Kelime Çalışması</div>

<div class="menu">
<button onclick="goster('harf')">Harf Çalışması</button>
<button onclick="goster('kelime')">Kelime Çalışması</button>
<button onclick="goster('kendini')">Kendini Denе</button>
</div>

<!-- HARF ÇALIŞMASI -->
<div id="harf" class="bolum">
  <div class="kart-menu" id="harfMenu"></div>
  <div class="kapsayici" id="harfKartlar"></div>
</div>

<!-- KELİME ÇALIŞMASI -->
<div id="kelime" class="bolum">
  <div class="kart-menu" id="kelimeMenu"></div>
  <div class="kapsayici" id="kelimeKartlar"></div>
</div>

<!-- KENDİNİ DENE -->
<div id="kendini" class="bolum">
  <div class="baslik">Kendini Denе</div>
  <p>Bir harfi veya kelimeyi seçip dinleyerek kendini test edebilirsin!</p>
  <div class="kapsayici">
    <div class="kart">
      <h2>Video Test Örneği</h2>
      <p class="kirmizi" onclick="videoAc('testVideo')">Dinlemek için dokun</p>
      <video id="testVideo" controls>
        <source src="test.mp4" type="video/mp4">
      </video>
    </div>
  </div>
  <!-- Quiz Bölümü -->
  <div id="quiz">
    <div class="quiz-soru" id="quizSoru"></div>
    <div id="quizSecenekler"></div>
    <div class="quiz-sonuc" id="quizSonuc"></div>
    <button class="quiz-secim" onclick="yeniQuiz()">Yeni Soru</button>
  </div>
</div>

<script>
// Harf ve kelime verileri
const harfler = [
  {harf:"A", img:"a.jpg", video:"a.mp4"},
  {harf:"B", img:"b.jpg", video:"b.mp4"},
  {harf:"C", img:"c.jpg", video:"c.mp4"},
  {harf:"D", img:"d.jpg", video:"d.mp4"},
  {harf:"E", img:"e.jpg", video:"e.mp4"},
  {harf:"F", img:"f.jpg", video:"f.mp4"}
];
const kelimeler = [
  {kelime:"Araba", img:"araba.jpg", video:"araba.mp4"},
  {kelime:"Balık", img:"balik.jpg", video:"balik.mp4"},
  {kelime:"Cepler", img:"cepler.jpg", video:"cepler.mp4"}
];

// Bölüm gösterme
function goster(id){
  document.querySelectorAll('.bolum').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==="harf") harfMenuOlustur();
  if(id==="kelime") kelimeMenuOlustur();
}

// Harf menüsü oluştur
function harfMenuOlustur(){
  const menu = document.getElementById('harfMenu');
  menu.innerHTML = "";
  harfler.forEach(h=>{
    const btn = document.createElement('button');
    btn.textContent = h.harf;
    btn.onclick = ()=> harfKartGoster(h.harf);
    menu.appendChild(btn);
  });
  document.getElementById('harfKartlar').innerHTML = "";
}

// Harf kartı göster (SADECE VİDEO ve "Dinlemek için dokun" yazısı)
function harfKartGoster(harf){
  const kartlarDiv = document.getElementById('harfKartlar');
  kartlarDiv.innerHTML = "";
  const h = harfler.find(x=>x.harf===harf);
  if(h){
    kartlarDiv.innerHTML = `
      <div class="kart">
        <p class="kirmizi" onclick="videoAc('video_${h.harf}')">Dinlemek için dokun</p>
        <video id="video_${h.harf}" controls>
          <source src="${h.video}" type="video/mp4">
        </video>
      </div>
    `;
  }
}

// Kelime menüsü oluştur
function kelimeMenuOlustur(){
  const menu = document.getElementById('kelimeMenu');
  menu.innerHTML = "";
  kelimeler.forEach(k=>{
    const btn = document.createElement('button');
    btn.textContent = k.kelime;
    btn.onclick = ()=> kelimeKartGoster(k.kelime);
    menu.appendChild(btn);
  });
  document.getElementById('kelimeKartlar').innerHTML = "";
}

// Kelime kartı göster (görsel, başlık ve video)
function kelimeKartGoster(kelime){
  const kartlarDiv = document.getElementById('kelimeKartlar');
  kartlarDiv.innerHTML = "";
  const k = kelimeler.find(x=>x.kelime===kelime);
  if(k){
    kartlarDiv.innerHTML = `
      <div class="kart">
        <h2>${k.kelime}</h2>
        <img src="${k.img}" alt="${k.kelime} görseli">
        <p class="kirmizi" onclick="videoAc('video_${k.kelime}')">Dinlemek için dokun</p>
        <video id="video_${k.kelime}" controls>
          <source src="${k.video}" type="video/mp4">
        </video>
      </div>
    `;
  }
}

// Video açma/kapatma ve diğerlerini kapatma
function videoAc(videoId){
  document.querySelectorAll('video').forEach(v => {
    v.pause();
    v.style.display = "none";
    v.currentTime = 0;
  });
  var video = document.getElementById(videoId);
  if(video.style.display==="none" || video.style.display===""){
    video.style.display="block";
    video.play();
  } else {
    video.pause();
    video.style.display="none";
  }
}

// Video bitince otomatik gizle
document.addEventListener("DOMContentLoaded", function() {
  document.querySelectorAll('video').forEach(v => {
    v.onended = function() {
      v.style.display = "none";
    };
    v.onpause = function() {
      if (v.currentTime < v.duration) v.style.display = "none";
    };
  });
});

// Quiz verileri
const quizSorular = [
  {soru: "A harfiyle başlayan kelime hangisidir?", secenekler: ["Araba", "Balık", "Cepler"], dogru: "Araba"},
  {soru: "B harfiyle başlayan kelime hangisidir?", secenekler: ["Cepler", "Balık", "Araba"], dogru: "Balık"},
  {soru: "C harfiyle başlayan kelime hangisidir?", secenekler: ["Cepler", "Araba", "Balık"], dogru: "Cepler"},
  {soru: "Balık kelimesinin ilk harfi nedir?", secenekler: ["B", "A", "C"], dogru: "B"}
];

let quizIndex = 0;

function yeniQuiz() {
  quizIndex = Math.floor(Math.random() * quizSorular.length);
  const soru = quizSorular[quizIndex];
  document.getElementById('quizSoru').textContent = soru.soru;
  const seceneklerDiv = document.getElementById('quizSecenekler');
  seceneklerDiv.innerHTML = "";
  soru.secenekler.forEach(sec => {
    const btn = document.createElement('button');
    btn.className = "quiz-secim";
    btn.textContent = sec;
    btn.onclick = function() { quizCevap(sec); };
    seceneklerDiv.appendChild(btn);
  });
  document.getElementById('quizSonuc').textContent = "";
}
function quizCevap(secim) {
  const dogru = quizSorular[quizIndex].dogru;
  if(secim === dogru){
    document.getElementById('quizSonuc').textContent = "Tebrikler, doğru!";
    document.getElementById('quizSonuc').style.color = "green";
  } else {
    document.getElementById('quizSonuc').textContent = "Yanlış, tekrar dene!";
    document.getElementById('quizSonuc').style.color = "red";
  }
}
// Sayfa açılınca ilk quiz gelsin
window.onload = yeniQuiz;
</script>

</body>
</html>
